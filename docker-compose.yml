services:
  postgres:
    image: postgres:15
    environment:
      # - POSTGRES_USER:postgres
      # - POSTGRES_PASSWORD:postgres
      # - POSTGRES_DB:notificationsCenter
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASS}
      - POSTGRES_DB=${DATABASE_NAME}
    ports:
      - '5432:5432'
    volumes: 
    - postgres_data:/var/lib/postgresql/data
volumes: 
  postgres_data:
